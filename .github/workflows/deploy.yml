name: Deploy application

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["test"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: pyflask
  ECR_REGISTRY_ALIAS: s2k6v4e2
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  packages: write # for docker layer cache

jobs:
  build:
    name: Build and push docker image to ECR 
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: aws-testing

    steps:
      # Pulls my repo files onto the machine
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4


      - name: Build, tag, and push image to Amazon ECR Public
        id: build-image
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REGISTRY_ALIAS }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: image-url
        run: echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REGISTRY_ALIAS }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  infrastructure:
    name: Terraform apply infrastructure
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
      
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve # -auto-approve to bypass "yes"
    
      - name: Get EC2 instance ID
        id: ec2
        working-directory: ./terraform
        run: echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT

      - name: Wait for EC2 to be ready
        run: |
          aws ec2 wait instance-status-ok \
            --instance-ids ${{ steps.ec2.outputs.instance_id }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: infrastructure
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
     
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

        # terraform output will not work without terraform init
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
      
      - name: Get EC2 public IP
        id: ec2-ip
        working-directory: ./terraform
        run: |
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
 
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PEM_FILE }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan ${{ steps.ec2-ip.outputs.ec2_public_ip }} >> ~/.ssh/known_hosts

      - name: SSH into EC2 instance
        run: |
          ssh -i ~/.ssh/key.pem ec2-user@${{ steps.ec2-ip.outputs.ec2_public_ip }} << 'EOF'
            docker pull public.ecr.aws/${{ env.ECR_REGISTRY_ALIAS }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            docker run -d -p80:5000 public.ecr.aws/${{ env.ECR_REGISTRY_ALIAS }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          EOF

    outputs:
      ec2_public_ip: ${{ steps.ec2-ip.outputs.ec2_public_ip }}

  check:
    name: curl EC2
    runs-on: ubuntu-latest
    needs: deploy
    steps:
        # --fail makes curl return a non-zero exit code if the response isn't 200, which causes the job to fail and trigger cleanup
      - name: Health check
        run: | # rerun 5 times in case app isn't ready
          for i in {1..5}; do
            curl --fail http://${{ needs.deploy.outputs.ec2_public_ip }}/ && break
            sleep 10
          done

  destroy:
    name: Terraform destroy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: ./terraform
        run: terraform destroy -auto-approve

  # Runs if any previous jobs failed (if: failure())
  cleanup:
    name: Cleanup on fail
    runs-on: ubuntu-latest
    needs: [build, infrastructure, deploy, check]
    if: failure()
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: ./terraform
        run: terraform destroy -auto-approve
