apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudpipe-web
  labels:
    app: cloudpipe-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudpipe-web
  template:
    metadata:
      labels:
        app: cloudpipe-web
    spec:
      containers:
        - name: web
          image: cloudpipe-web:local
          imagePullPolicy: Never # image is built directly into Minikube's Docker daemon, not pulled from a registry
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: cloudpipe-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
